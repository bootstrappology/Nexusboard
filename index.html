<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusBoard - Local-First Node Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            gap: 1px;
            background: #1e293b;
        }

        .sidebar {
            width: 320px;
            background: #0f172a;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0, 0, 0, 0.3);
        }

        .sidebar h1 {
            font-size: 20px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .create-panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 8px 12px;
            color: #e2e8f0;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: #1e293b;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .nodes-list {
            flex: 1;
        }

        .nodes-list h2 {
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            margin: 20px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        .node-item {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .node-item:hover {
            border-color: #60a5fa;
            background: #1e293b;
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.15);
        }

        .node-item-content {
            flex: 1;
            min-width: 0;
        }

        .node-item-label {
            font-weight: 600;
            font-size: 13px;
            color: #e2e8f0;
            word-break: break-word;
        }

        .node-item-tags {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .node-item-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .node-item-delete:hover {
            background: rgba(239, 68, 68, 0.4);
            color: #fecaca;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
            background: inherit;
        }

        .canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: #94a3b8;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .zoom-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #334155;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 12px;
            color: #e2e8f0;
            backdrop-filter: blur(10px);
            z-index: 100;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .info-panel strong {
            color: #e2e8f0;
        }

        .connection-label {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            color: #cbd5e1;
            backdrop-filter: blur(10px);
            display: none;
            z-index: 50;
            pointer-events: none;
        }

        .connection-label.visible {
            display: block;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 280px;
                font-size: 14px;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                height: 35vh;
                border-right: none;
                border-top: 1px solid #334155;
                border-bottom: none;
                max-height: none;
                z-index: 50;
                overflow-y: auto;
                box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.35);
            }

            .canvas-container {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: 65vh;
                width: 100%;
                overflow: hidden;
            }

            canvas {
                height: 100%;
                width: 100%;
            }
        }

        .tag {
            display: inline-block;
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid #3b82f6;
            color: #93c5fd;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            margin-right: 4px;
            margin-top: 4px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .btn-secondary {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 8px 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            text-align: center;
        }

        .btn-secondary:hover {
            border-color: #60a5fa;
            background: #0f172a;
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.15);
        }

        .preset-select {
            appearance: none;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            flex: 2;
            min-width: 160px;
            transition: all 0.2s;
        }

        .preset-select:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        #fileInput {
            display: none;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-container input {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .search-container input:focus {
            outline: none;
            border-color: #60a5fa;
            background: #1e293b;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .search-results {
            font-size: 11px;
            color: #94a3b8;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
            margin-bottom: 8px;
        }

        .node-item.search-match {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .node-highlight {
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.6));
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h1>NexusBoard</h1>
            
            <div class="create-panel">
                <div class="form-group">
                    <label>Node Label</label>
                    <input type="text" id="nodeLabel" placeholder="e.g., Design System" maxlength="100">
                </div>
                <div class="form-group">
                    <label>Tags (comma-separated)</label>
                    <input type="text" id="nodeTags" placeholder="e.g., ui, design, core" maxlength="200">
                </div>
                <div class="form-group">
                    <label>Metadata (JSON)</label>
                    <textarea id="nodeMetadata" placeholder='{"key": "value"}'></textarea>
                </div>
                <button class="btn-primary" onclick="nexusApp.createNode()">Create Node</button>
            </div>

            <div class="toolbar">
                <select id="presetSelect" class="preset-select" onchange="nexusApp.loadPreset(this.value)">
                    <option value="">Load template...</option>
                    <option value="startup">Startup Map</option>
                    <option value="team">Team Network</option>
                    <option value="idea">Idea Web</option>
                </select>
                <button class="btn-secondary" onclick="nexusApp.resetView()">Reset View</button>
                <button class="btn-secondary" onclick="nexusApp.copyShareLink()">Share</button>
            </div>

            <div class="toolbar">
                <button class="btn-secondary" onclick="nexusApp.exportToJSON()">Export JSON</button>
                <button class="btn-secondary" onclick="nexusApp.exportToPNG()">Export PNG</button>
                <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">Import</button>
                <input type="file" id="fileInput" accept="application/json" onchange="nexusApp.importFromJSON(event)">
            </div>

            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search nodes..." onkeyup="nexusApp.search(this.value)">
                <div class="search-results" id="searchResults"></div>
            </div>
                <h2>Nodes</h2>
                <div id="nodesList"></div>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div class="canvas-overlay" id="canvasOverlay"></div>
            <div class="zoom-indicator" id="zoomIndicator">100%</div>
            <div class="info-panel">
                <strong>Nodes:</strong> <span id="nodeCount">0</span> | 
                <strong>Connections:</strong> <span id="connectionCount">0</span>
                <br><strong>Hint:</strong> Click to create/connect, drag to move, right-click to delete
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // DATA MODEL & PERSISTENCE
        // ============================================================================

        class Node {
            constructor(x, y, label = '', tags = [], metadata = {}) {
                this.id = 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                this.label = label;
                this.tags = tags;
                this.x = x;
                this.y = y;
                this.radius = 40;
                this.timestamp = new Date().toISOString();
                this.metadata = metadata;
            }

            toJSON() {
                return {
                    id: this.id,
                    label: this.label,
                    tags: this.tags,
                    x: this.x,
                    y: this.y,
                    radius: this.radius,
                    timestamp: this.timestamp,
                    metadata: this.metadata
                };
            }

            static fromJSON(data) {
                const node = new Node(data.x, data.y, data.label, data.tags, data.metadata);
                node.id = data.id;
                node.timestamp = data.timestamp;
                return node;
            }

            contains(x, y) {
                const dx = x - this.x;
                const dy = y - this.y;
                return dx * dx + dy * dy <= this.radius * this.radius;
            }
        }

        class Connection {
            constructor(fromNodeId, toNodeId, label = '') {
                this.id = 'conn_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                this.fromNodeId = fromNodeId;
                this.toNodeId = toNodeId;
                this.label = label;
                this.timestamp = new Date().toISOString();
            }

            toJSON() {
                return {
                    id: this.id,
                    fromNodeId: this.fromNodeId,
                    toNodeId: this.toNodeId,
                    label: this.label,
                    timestamp: this.timestamp
                };
            }

            static fromJSON(data) {
                const conn = new Connection(data.fromNodeId, data.toNodeId, data.label);
                conn.id = data.id;
                conn.timestamp = data.timestamp;
                return conn;
            }
        }

        class NexusBoardApp {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvasOverlay = document.getElementById('canvasOverlay');
                
                this.nodes = [];
                this.connections = [];
                this.draggedNode = null;
                this.dragOffset = null;
                this.connectingFrom = null;
                this.hoveredNode = null;
                this.selectedNode = null;
                this.searchQuery = '';
                this.searchMatches = new Set();
                this.cursorPosition = null;

                this.camera = {
                    x: 0,
                    y: 0,
                    scale: 1
                };
                this.isPanning = false;
                this.isSpaceDown = false;
                this.panStart = null;

                // Undo/Redo stacks
                this.undoStack = [];
                this.redoStack = [];
                this.maxUndoSteps = 50;
                
                this.setupCanvas();
                this.setupEventListeners();
                this.load();
                this.render();
            }

            setupCanvas() {
                this.canvas.width = this.canvas.offsetWidth;
                this.canvas.height = this.canvas.offsetHeight;
                
                const resizeObserver = new ResizeObserver(() => {
                    this.canvas.width = this.canvas.offsetWidth;
                    this.canvas.height = this.canvas.offsetHeight;
                    this.render();
                });
                resizeObserver.observe(this.canvas);
            }

            setupEventListeners() {
                this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
                this.canvas.addEventListener('dblclick', (e) => this.handleDoubleClick(e));
                this.canvas.addEventListener('contextmenu', (e) => this.handleRightClick(e));
                this.canvas.addEventListener('mousedown', (e) => this.handleMouseDown(e));
                this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.canvas.addEventListener('mouseup', () => this.handleMouseUp());
                this.canvas.addEventListener('mouseleave', () => this.handleMouseUp());
                this.canvas.addEventListener('wheel', (e) => this.handleWheel(e), { passive: false });
                
                // Keyboard shortcuts and panning
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));
                document.addEventListener('keyup', (e) => this.handleKeyUp(e));
                window.addEventListener('blur', () => {
                    this.isSpaceDown = false;
                    this.isPanning = false;
                    this.panStart = null;
                    this.canvas.style.cursor = '';
                });
            }

            getMousePos(e) {
                const rect = this.canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                return this.screenToWorld(screenX, screenY);
            }

            screenToWorld(screenX, screenY) {
                return {
                    x: screenX / this.camera.scale + this.camera.x,
                    y: screenY / this.camera.scale + this.camera.y
                };
            }

            getVisibleBounds() {
                const left = this.camera.x;
                const top = this.camera.y;
                return {
                    left,
                    top,
                    right: left + this.canvas.width / this.camera.scale,
                    bottom: top + this.canvas.height / this.camera.scale
                };
            }

            snapToGrid(value, gridSize = 120) {
                return Math.round(value / gridSize) * gridSize;
            }

            isPositionOverlapping(x, y, radius = 40, padding = 24, existingNodes = null) {
                const nodes = existingNodes || this.nodes;
                return nodes.some(node => {
                    const dx = node.x - x;
                    const dy = node.y - y;
                    const minDist = (node.radius || 40) + radius + padding;
                    return dx * dx + dy * dy < minDist * minDist;
                });
            }

            findNonOverlappingPosition(preferred = null, existingNodes = null) {
                const bounds = this.getVisibleBounds();
                const minX = bounds.left + 80;
                const maxX = bounds.right - 80;
                const minY = bounds.top + 80;
                const maxY = bounds.bottom - 80;
                const startX = Math.min(Math.max(preferred?.x ?? (bounds.left + bounds.right) / 2, minX), maxX);
                const startY = Math.min(Math.max(preferred?.y ?? (bounds.top + bounds.bottom) / 2, minY), maxY);
                const gridStep = 120;
                const nodesToCheck = existingNodes || this.nodes;

                for (let ring = 0; ring <= 8; ring++) {
                    for (let dx = -ring; dx <= ring; dx++) {
                        for (let dy = -ring; dy <= ring; dy++) {
                            if (Math.abs(dx) !== ring && Math.abs(dy) !== ring) continue;
                            const x = this.snapToGrid(startX + dx * gridStep, gridStep);
                            const y = this.snapToGrid(startY + dy * gridStep, gridStep);
                            if (x < minX || x > maxX || y < minY || y > maxY) continue;
                            if (!this.isPositionOverlapping(x, y, 40, 20, nodesToCheck)) {
                                return { x, y };
                            }
                        }
                    }
                }

                return { x: this.snapToGrid(startX, gridStep), y: this.snapToGrid(startY, gridStep) };
            }

            spaceNodesForTemplate(nodes) {
                const positioned = [];
                for (const node of nodes) {
                    const desired = { x: node.x, y: node.y };
                    const safePosition = this.findNonOverlappingPosition(desired, positioned);
                    node.x = safePosition.x;
                    node.y = safePosition.y;
                    positioned.push(node);
                }
            }

            worldToScreen(x, y) {
                return {
                    x: (x - this.camera.x) * this.camera.scale,
                    y: (y - this.camera.y) * this.camera.scale
                };
            }

            getNodeAtPos(x, y) {
                for (let i = this.nodes.length - 1; i >= 0; i--) {
                    if (this.nodes[i].contains(x, y)) {
                        return this.nodes[i];
                    }
                }
                return null;
            }

            handleMouseDown(e) {
                const pos = this.getMousePos(e);
                const node = this.getNodeAtPos(pos.x, pos.y);
                const shouldPan = e.button === 1 || this.isSpaceDown;

                if (shouldPan) {
                    e.preventDefault();
                    this.isPanning = true;
                    this.panStart = {
                        x: e.clientX,
                        y: e.clientY,
                        cameraX: this.camera.x,
                        cameraY: this.camera.y
                    };
                    this.canvas.style.cursor = 'grabbing';
                    return;
                }

                if (node) {
                    this.draggedNode = node;
                    this.dragOffset = {
                        x: node.x - pos.x,
                        y: node.y - pos.y
                    };
                }
            }

            handleMouseMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                const pos = this.screenToWorld(screenX, screenY);
                this.cursorPosition = pos;

                if (this.isPanning && this.panStart) {
                    e.preventDefault();
                    const dx = (e.clientX - this.panStart.x) / this.camera.scale;
                    const dy = (e.clientY - this.panStart.y) / this.camera.scale;
                    this.camera.x = this.panStart.cameraX - dx;
                    this.camera.y = this.panStart.cameraY - dy;
                    this.render();
                    return;
                }

                if (this.draggedNode) {
                    this.draggedNode.x = pos.x + this.dragOffset.x;
                    this.draggedNode.y = pos.y + this.dragOffset.y;
                    this.save();
                    this.render();
                } else {
                    const node = this.getNodeAtPos(pos.x, pos.y);
                    if (node !== this.hoveredNode) {
                        this.hoveredNode = node;
                        this.render();
                    }
                }
            }

            handleMouseUp() {
                if (this.draggedNode) {
                    this.saveState();
                }
                this.draggedNode = null;
                this.dragOffset = null;
                this.isPanning = false;
                this.panStart = null;
                this.canvas.style.cursor = '';
                this.render();
            }

            zoomAtPoint(mouseX, mouseY, newScale) {
                const worldX = mouseX / this.camera.scale + this.camera.x;
                const worldY = mouseY / this.camera.scale + this.camera.y;

                this.camera.scale = newScale;
                this.camera.x = worldX - mouseX / newScale;
                this.camera.y = worldY - mouseY / newScale;
            }

            handleWheel(e) {
                if (!e.deltaY) return;
                e.preventDefault();

                const rect = this.canvas.getBoundingClientRect();
                const screenX = e.clientX - rect.left;
                const screenY = e.clientY - rect.top;
                const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
                const newScale = Math.min(5, Math.max(0.1, this.camera.scale * zoomFactor));
                if (newScale === this.camera.scale) return;

                this.zoomAtPoint(screenX, screenY, newScale);
                this.render();
            }

            handleKeyDown(e) {
                if (e.key === ' ' || e.code === 'Space') {
                    if (!this.isSpaceDown) {
                        this.isSpaceDown = true;
                        this.canvas.style.cursor = 'grab';
                    }
                    e.preventDefault();
                }

                if (e.key === 'Escape') {
                    if (this.editInput) {
                        this.stopEditingNode();
                    }
                    if (this.selectedNode) {
                        this.selectedNode = null;
                        this.render();
                    }
                    e.preventDefault();
                    return;
                }

                if (e.key === 'Delete' && this.selectedNode && document.activeElement !== this.editInput) {
                    this.deleteNode(this.selectedNode.id);
                    e.preventDefault();
                    return;
                }

                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z' && !e.shiftKey) {
                        e.preventDefault();
                        this.undo();
                    } else if ((e.key === 'y') || (e.key === 'z' && e.shiftKey)) {
                        e.preventDefault();
                        this.redo();
                    }
                }
            }

            handleKeyUp(e) {
                if (e.key === ' ' || e.code === 'Space') {
                    this.isSpaceDown = false;
                    this.isPanning = false;
                    this.panStart = null;
                    this.canvas.style.cursor = '';
                }
            }

            handleDoubleClick(e) {
                const pos = this.getMousePos(e);
                const node = this.getNodeAtPos(pos.x, pos.y);
                
                if (node) {
                    this.startEditingNode(node);
                }
            }

            startEditingNode(node) {
                // Remove any existing edit input
                this.stopEditingNode();
                
                // Create input element
                const screen = this.worldToScreen(node.x, node.y);
                const input = document.createElement('input');
                input.type = 'text';
                input.value = node.label;
                input.className = 'node-edit-input';
                input.style.position = 'absolute';
                input.style.left = (screen.x - 60) + 'px';
                input.style.top = (screen.y - 10) + 'px';
                input.style.width = '120px';
                input.style.textAlign = 'center';
                input.style.fontSize = '13px';
                input.style.fontFamily = 'inherit';
                input.style.border = '2px solid #60a5fa';
                input.style.borderRadius = '4px';
                input.style.background = '#0f172a';
                input.style.color = '#e2e8f0';
                input.style.outline = 'none';
                input.style.zIndex = '1000';
                
                // Handle save
                const saveEdit = () => {
                    const newLabel = input.value.trim();
                    if (newLabel && newLabel !== node.label) {
                        node.label = newLabel;
                        this.saveState();
                        this.save();
                        this.render();
                        this.updateUI();
                    }
                    this.stopEditingNode();
                };
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        saveEdit();
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        this.stopEditingNode();
                    }
                });
                
                input.addEventListener('blur', saveEdit);
                
                this.canvasOverlay.appendChild(input);
                input.focus();
                input.select();
                
                this.editingNode = node;
                this.editInput = input;
            }

            stopEditingNode() {
                if (this.editInput) {
                    this.editInput.remove();
                    this.editInput = null;
                    this.editingNode = null;
                }
            }

            handleCanvasClick(e) {
                if (this.isPanning) return;

                const pos = this.getMousePos(e);
                const node = this.getNodeAtPos(pos.x, pos.y);
                
                if (e.ctrlKey || e.metaKey) {
                    // Connection mode
                    if (!node) return;
                    
                    if (!this.connectingFrom) {
                        this.connectingFrom = node;
                    } else if (node === this.connectingFrom) {
                        this.connectingFrom = null;
                    } else {
                        const conn = new Connection(this.connectingFrom.id, node.id);
                        this.connections.push(conn);
                        this.connectingFrom = null;
                        this.saveState();
                        this.save();
                        this.render();
                        this.updateUI();
                    }
                } else {
                    // Click on node to select/deselect
                    if (node) {
                        this.highlightNode(node);
                    } else {
                        if (this.selectedNode) {
                            this.selectedNode = null;
                            this.render();
                        }
                    }
                }
            }

            handleRightClick(e) {
                e.preventDefault();
                const pos = this.getMousePos(e);
                const node = this.getNodeAtPos(pos.x, pos.y);
                
                if (node) {
                    this.deleteNode(node.id);
                }
            }

            highlightNode(node) {
                this.selectedNode = node;
                this.render();

                // Scroll node into view in sidebar
                const nodesList = document.getElementById('nodesList');
                const nodeElement = nodesList.querySelector(`[data-node-id="${node.id}"]`);
                if (nodeElement) {
                    nodeElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }

            createNode() {
                const labelInput = document.getElementById('nodeLabel');
                const tagsInput = document.getElementById('nodeTags');
                const metadataInput = document.getElementById('nodeMetadata');
                
                const label = labelInput.value.trim();
                if (!label) {
                    alert('Please enter a node label');
                    return;
                }
                
                const tags = tagsInput.value
                    .split(',')
                    .map(t => t.trim())
                    .filter(t => t.length > 0);
                
                let metadata = {};
                if (metadataInput.value.trim()) {
                    try {
                        metadata = JSON.parse(metadataInput.value);
                    } catch (e) {
                        alert('Invalid JSON in metadata');
                        return;
                    }
                }
                
                const viewWidth = this.canvas.width / this.camera.scale;
                const viewHeight = this.canvas.height / this.camera.scale;
                const center = {
                    x: this.camera.x + viewWidth / 2,
                    y: this.camera.y + viewHeight / 2
                };
                const position = this.cursorPosition || center;
                const safePosition = this.findNonOverlappingPosition(position);
                const node = new Node(
                    safePosition.x,
                    safePosition.y,
                    label,
                    tags,
                    metadata
                );
                
                this.nodes.push(node);
                this.saveState();
                this.save();
                this.render();
                this.updateUI();
                
                labelInput.value = '';
                tagsInput.value = '';
                metadataInput.value = '';
                labelInput.focus();
            }

            resetView() {
                if (this.nodes.length === 0) {
                    this.camera = { x: 0, y: 0, scale: 1 };
                } else {
                    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                    for (const node of this.nodes) {
                        minX = Math.min(minX, node.x - node.radius);
                        minY = Math.min(minY, node.y - node.radius);
                        maxX = Math.max(maxX, node.x + node.radius);
                        maxY = Math.max(maxY, node.y + node.radius);
                    }

                    const margin = 160;
                    const worldWidth = Math.max(400, maxX - minX + margin);
                    const worldHeight = Math.max(300, maxY - minY + margin);
                    const scaleX = this.canvas.width / worldWidth;
                    const scaleY = this.canvas.height / worldHeight;
                    const newScale = Math.min(5, Math.max(0.1, Math.min(scaleX, scaleY)));

                    this.camera.scale = newScale;
                    this.camera.x = minX - margin / 2;
                    this.camera.y = minY - margin / 2;
                }

                this.render();
            }

            deleteNode(nodeId) {
                if (this.selectedNode && this.selectedNode.id === nodeId) {
                    this.selectedNode = null;
                }
                this.nodes = this.nodes.filter(n => n.id !== nodeId);
                this.connections = this.connections.filter(c => 
                    c.fromNodeId !== nodeId && c.toNodeId !== nodeId
                );
                this.saveState();
                this.save();
                this.render();
                this.updateUI();
            }

            deleteConnection(connectionId) {
                this.connections = this.connections.filter(c => c.id !== connectionId);
                this.saveState();
                this.save();
                this.render();
                this.updateUI();
            }

            search(query) {
                this.searchQuery = query.toLowerCase().trim();
                this.searchMatches.clear();
                
                if (this.searchQuery.length === 0) {
                    document.getElementById('searchResults').textContent = '';
                    this.updateUI();
                    this.render();
                    return;
                }
                
                for (const node of this.nodes) {
                    const labelMatch = node.label.toLowerCase().includes(this.searchQuery);
                    const tagsMatch = node.tags.some(tag => tag.toLowerCase().includes(this.searchQuery));
                    
                    if (labelMatch || tagsMatch) {
                        this.searchMatches.add(node.id);
                    }
                }
                
                const count = this.searchMatches.size;
                document.getElementById('searchResults').textContent = 
                    count > 0 ? `Found ${count} node${count !== 1 ? 's' : ''}` : 'No matches';
                
                this.updateUI();
                this.render();
            }

            getStatePayload() {
                return {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON())
                };
            }

            encodeState(data) {
                const json = JSON.stringify(data);
                const encoded = encodeURIComponent(json).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1));
                return btoa(encoded);
            }

            decodeState(value) {
                const json = decodeURIComponent(Array.from(atob(value), c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                return JSON.parse(json);
            }

            loadFromState(data, replaceUrl = false) {
                this.nodes = (data.nodes || []).map(n => Node.fromJSON(n));
                this.connections = (data.connections || []).map(c => Connection.fromJSON(c));
                this.save();
                this.updateUI();
                this.render();
                if (replaceUrl) {
                    const url = new URL(window.location.href);
                    url.searchParams.set('board', this.encodeState(this.getStatePayload()));
                    window.history.replaceState({}, '', url);
                }
            }

            applyTemplateData(data) {
                this.nodes = data.nodes.map(n => Node.fromJSON(n));
                this.connections = data.connections.map(c => Connection.fromJSON(c));
                this.saveState();
                this.save();
                this.updateUI();
                this.render();
                const params = new URLSearchParams(window.location.search);
                if (params.has('board')) {
                    params.delete('board');
                    window.history.replaceState({}, '', window.location.pathname);
                }
            }

                const offset = 160;

                            { x: centerX - 160, y: centerY + 120, label: 'Marketing', tags: ['launch'], metadata: {} },

                        ],

                this.spaceNodesForTemplate(nodes);
                const connections = preset.connections.map(data => new Connection(nodes[data.from].id, nodes[data.to].id, data.label));
                this.nodes = nodes;

                this.save();
                this.updateUI();

                this.render();
                const select = document.getElementById('presetSelect');
                if (select) select.value = '';

                if (params.has('board')) {

            copyShareLink() {
                const data = this.getStatePayload();
                const boardValue = this.encodeState(data);
                const url = new URL(window.location.href);
                url.searchParams.set('board', boardValue);
                window.history.replaceState({}, '', url);

                const shareUrl = url.toString();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        alert('Share link copied to clipboard');
                    }).catch(() => {
                        prompt('Copy this share link:', shareUrl);
                    });
                } else {
                    prompt('Copy this share link:', shareUrl);
                }
            }

            exportToJSON() {
                const data = {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON()),
                    exportedAt: new Date().toISOString(),
                    version: '1.0'
                };
                
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `nexusboard-${Date.now()}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            exportToPNG() {
                // Calculate bounds of all nodes and connections
                if (this.nodes.length === 0) {
                    alert('No nodes to export');
                    return;
                }
                
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                
                for (const node of this.nodes) {
                    minX = Math.min(minX, node.x - node.radius - 20);
                    minY = Math.min(minY, node.y - node.radius - 20);
                    maxX = Math.max(maxX, node.x + node.radius + 20);
                    maxY = Math.max(maxY, node.y + node.radius + 20);
                }
                
                const width = Math.max(maxX - minX, 800);
                const height = Math.max(maxY - minY, 600);
                
                // Create temporary canvas
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = width;
                tempCanvas.height = height;
                
                // Set background
                tempCtx.fillStyle = '#1e293b';
                tempCtx.fillRect(0, 0, width, height);
                
                // Translate to center the content
                const offsetX = -minX + 40;
                const offsetY = -minY + 40;
                tempCtx.translate(offsetX, offsetY);
                
                // Draw connections first
                for (const conn of this.connections) {
                    const fromNode = this.nodes.find(n => n.id === conn.fromNodeId);
                    const toNode = this.nodes.find(n => n.id === conn.toNodeId);
                    
                    if (fromNode && toNode) {
                        this.drawConnectionToCanvas(tempCtx, fromNode, toNode, conn.label);
                    }
                }
                
                // Draw nodes
                for (const node of this.nodes) {
                    this.drawNodeToCanvas(tempCtx, node);
                }
                
                // Download the image
                const dataURL = tempCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.href = dataURL;
                link.download = `nexusboard-${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            drawConnectionToCanvas(ctx, fromNode, toNode, label = '') {
                const dx = toNode.x - fromNode.x;
                const dy = toNode.y - fromNode.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                const fromX = fromNode.x + (dx / distance) * fromNode.radius;
                const fromY = fromNode.y + (dy / distance) * fromNode.radius;
                const toX = toNode.x - (dx / distance) * toNode.radius;
                const toY = toNode.y - (dy / distance) * toNode.radius;
                
                ctx.strokeStyle = '#64748b';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(fromX, fromY);
                ctx.lineTo(toX, toY);
                ctx.stroke();
                
                // Draw arrow
                const arrowSize = 12;
                const angle = Math.atan2(toY - fromY, toX - fromX);
                ctx.fillStyle = '#64748b';
                ctx.beginPath();
                ctx.moveTo(toX, toY);
                ctx.lineTo(toX - arrowSize * Math.cos(angle - Math.PI / 6), toY - arrowSize * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(toX - arrowSize * Math.cos(angle + Math.PI / 6), toY - arrowSize * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fill();
                
                // Draw label if exists
                if (label) {
                    const midX = (fromX + toX) / 2;
                    const midY = (fromY + toY) / 2;
                    
                    ctx.fillStyle = '#cbd5e1';
                    ctx.font = '11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    ctx.fillRect(midX - 30, midY - 12, 60, 20);
                    ctx.fillStyle = '#0f172a';
                    ctx.fillText(label, midX, midY);
                }
            }

            drawNodeToCanvas(ctx, node) {
                const gradient = ctx.createRadialGradient(
                    node.x - 15, node.y - 15, 0,
                    node.x, node.y, node.radius
                );
                
                gradient.addColorStop(0, '#64748b');
                gradient.addColorStop(1, '#334155');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.strokeStyle = '#94a3b8';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = '#e2e8f0';
                ctx.font = 'bold 13px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                const maxWidth = node.radius * 1.8;
                this.drawTextInCircleToCanvas(ctx, node.label, node.x, node.y, maxWidth);
            }

            drawTextInCircleToCanvas(ctx, text, x, y, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                
                for (const word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    const metrics = ctx.measureText(testLine);
                    
                    if (metrics.width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                
                if (currentLine) lines.push(currentLine);
                
                const lineHeight = 14;
                const totalHeight = lineHeight * lines.length;
                let startY = y - totalHeight / 2;
                
                for (const line of lines) {
                    ctx.fillText(line, x, startY);
                    startY += lineHeight;
                }
            }

            importFromJSON(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        
                        if (!data.nodes || !Array.isArray(data.nodes)) {
                            throw new Error('Invalid file format: missing nodes array');
                        }
                        
                        if (!data.connections || !Array.isArray(data.connections)) {
                            throw new Error('Invalid file format: missing connections array');
                        }
                        
                        this.nodes = data.nodes.map(n => Node.fromJSON(n));
                        this.connections = data.connections.map(c => Connection.fromJSON(c));
                        
                        this.saveState();
                        this.save();
                        this.render();
                        this.updateUI();
                        document.getElementById('searchInput').value = '';
                        this.search('');
                        
                        alert(`Imported ${this.nodes.length} nodes and ${this.connections.length} connections`);
                    } catch (error) {
                        alert('Failed to import file: ' + error.message);
                        console.error(error);
                    }
                };
                reader.readAsText(file);
                
                // Reset file input so same file can be imported again
                event.target.value = '';
            }

            updateUI() {
                const nodesList = document.getElementById('nodesList');
                nodesList.innerHTML = this.nodes.map(node => {
                    const isMatch = this.searchMatches.has(node.id);
                    return `
                        <div class="node-item ${isMatch ? 'search-match' : ''}" data-node-id="${node.id}">
                            <div class="node-item-content">
                                <div class="node-item-label">${this.escapeHtml(node.label)}</div>
                                ${node.tags.length > 0 ? `
                                    <div class="node-item-tags">
                                        ${node.tags.map(tag => `<span class="tag">${this.escapeHtml(tag)}</span>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                            <button class="node-item-delete" onclick="nexusApp.deleteNode('${node.id}')">Delete</button>
                        </div>
                    `
                }).join('');
                
                document.getElementById('nodeCount').textContent = this.nodes.length;
                document.getElementById('connectionCount').textContent = this.connections.length;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            render() {
                this.ctx.setTransform(1, 0, 0, 1, 0, 0);
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.fillStyle = '#0f172a';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                this.ctx.save();
                this.ctx.setTransform(
                    this.camera.scale,
                    0,
                    0,
                    this.camera.scale,
                    -this.camera.x * this.camera.scale,
                    -this.camera.y * this.camera.scale
                );

                const gridSize = 80;
                const left = this.camera.x;
                const top = this.camera.y;
                const right = this.camera.x + this.canvas.width / this.camera.scale;
                const bottom = this.camera.y + this.canvas.height / this.camera.scale;
                const dotRadius = 1.2 / this.camera.scale;
                this.ctx.fillStyle = 'rgba(148, 163, 184, 0.08)';
                for (let x = Math.floor(left / gridSize) * gridSize; x <= right; x += gridSize) {
                    for (let y = Math.floor(top / gridSize) * gridSize; y <= bottom; y += gridSize) {
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }

                // Draw connections
                for (const conn of this.connections) {
                    const fromNode = this.nodes.find(n => n.id === conn.fromNodeId);
                    const toNode = this.nodes.find(n => n.id === conn.toNodeId);
                    
                    if (fromNode && toNode) {
                        this.drawConnection(fromNode, toNode, conn.label);
                    }
                }

                if (this.connectingFrom && this.cursorPosition) {
                    this.ctx.strokeStyle = '#60a5fa';
                    this.ctx.lineWidth = 2 / this.camera.scale;
                    this.ctx.setLineDash([5 / this.camera.scale, 5 / this.camera.scale]);
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.connectingFrom.x, this.connectingFrom.y);
                    this.ctx.lineTo(this.cursorPosition.x, this.cursorPosition.y);
                    this.ctx.stroke();
                    this.ctx.setLineDash([]);
                }

                // Draw nodes
                for (const node of this.nodes) {
                    this.drawNode(node, node === this.hoveredNode || node === this.connectingFrom);
                }

                this.ctx.restore();
                const zoomIndicator = document.getElementById('zoomIndicator');
                if (zoomIndicator) {
                    zoomIndicator.textContent = `${Math.round(this.camera.scale * 100)}%`;
                }
            }

            drawRoundedRect(ctx, x, y, width, height, radius) {
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + width - radius, y);
                ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
                ctx.lineTo(x + width, y + height - radius);
                ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                ctx.lineTo(x + radius, y + height);
                ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
            }

            drawNode(node, highlighted = false) {
                const isSearchMatch = this.searchMatches.has(node.id);
                const isSelected = node === this.selectedNode;
                const isHover = node === this.hoveredNode && !isSelected;
                
                // Draw glow for search matches or selection
                if (isSearchMatch || isSelected) {
                    this.ctx.fillStyle = isSelected ? 'rgba(96, 165, 250, 0.12)' : 'rgba(251, 191, 36, 0.1)';
                    this.ctx.beginPath();
                    this.ctx.arc(node.x, node.y, node.radius + 14, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                const gradient = this.ctx.createRadialGradient(
                    node.x - 15, node.y - 15, 0,
                    node.x, node.y, node.radius
                );
                
                if (isSelected) {
                    gradient.addColorStop(0, '#93c5fd');
                    gradient.addColorStop(1, '#2563eb');
                } else if (highlighted || node === this.connectingFrom) {
                    gradient.addColorStop(0, '#93c5fd');
                    gradient.addColorStop(1, '#3b82f6');
                } else if (isSearchMatch) {
                    gradient.addColorStop(0, '#fcd34d');
                    gradient.addColorStop(1, '#fbbf24');
                } else if (isHover) {
                    gradient.addColorStop(0, '#7c93b4');
                    gradient.addColorStop(1, '#334155');
                } else {
                    gradient.addColorStop(0, '#64748b');
                    gradient.addColorStop(1, '#334155');
                }
                
                const width = node.radius * 2.6;
                const height = node.radius * 1.5;
                const x = node.x - width / 2;
                const y = node.y - height / 2;
                const corner = Math.min(18, node.radius / 1.4);

                this.ctx.save();
                this.ctx.shadowColor = 'rgba(15, 23, 42, 0.35)';
                this.ctx.shadowBlur = 16 / this.camera.scale;
                this.ctx.shadowOffsetX = 0;
                this.ctx.shadowOffsetY = 8 / this.camera.scale;
                this.ctx.fillStyle = gradient;
                this.drawRoundedRect(this.ctx, x, y, width, height, corner);
                this.ctx.fill();
                this.ctx.restore();

                let strokeColor = '#94a3b8';
                let strokeWidth = 2 / this.camera.scale;
                
                if (isSelected) {
                    strokeColor = '#60a5fa';
                    strokeWidth = 4 / this.camera.scale;
                } else if (highlighted || node === this.connectingFrom) {
                    strokeColor = '#60a5fa';
                    strokeWidth = 3 / this.camera.scale;
                } else if (isSearchMatch) {
                    strokeColor = '#fbbf24';
                    strokeWidth = 3 / this.camera.scale;
                } else if (isHover) {
                    strokeColor = '#cbd5e1';
                    strokeWidth = 2.5 / this.camera.scale;
                    this.ctx.shadowColor = 'rgba(96, 165, 250, 0.12)';
                    this.ctx.shadowBlur = 8 / this.camera.scale;
                    this.ctx.shadowOffsetX = 0;
                    this.ctx.shadowOffsetY = 0;
                }
                
                this.ctx.strokeStyle = strokeColor;
                this.ctx.lineWidth = strokeWidth;
                this.drawRoundedRect(this.ctx, x, y, width, height, corner);
                this.ctx.stroke();
                this.ctx.shadowColor = 'transparent';
                this.ctx.shadowBlur = 0;
                
                this.ctx.fillStyle = '#e2e8f0';
                this.ctx.font = 'bold 13px sans-serif';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                
                const maxWidth = node.radius * 1.8;
                this.drawTextInCircle(node.label, node.x, node.y, maxWidth);
            }

            drawTextInCircle(text, x, y, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = '';
                
                for (const word of words) {
                    const testLine = currentLine ? currentLine + ' ' + word : word;
                    const metrics = this.ctx.measureText(testLine);
                    
                    if (metrics.width > maxWidth && currentLine) {
                        lines.push(currentLine);
                        currentLine = word;
                    } else {
                        currentLine = testLine;
                    }
                }
                
                if (currentLine) lines.push(currentLine);
                
                const lineHeight = 14;
                const totalHeight = lineHeight * lines.length;
                let startY = y - totalHeight / 2;
                
                for (const line of lines) {
                    this.ctx.fillText(line, x, startY);
                    startY += lineHeight;
                }
            }

            drawConnection(fromNode, toNode, label = '') {
                const dx = toNode.x - fromNode.x;
                const dy = toNode.y - fromNode.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                const fromX = fromNode.x + (dx / distance) * fromNode.radius;
                const fromY = fromNode.y + (dy / distance) * fromNode.radius;
                const toX = toNode.x - (dx / distance) * toNode.radius;
                const toY = toNode.y - (dy / distance) * toNode.radius;
                
                this.ctx.strokeStyle = '#64748b';
                this.ctx.lineWidth = 2 / this.camera.scale;
                const midX = (fromX + toX) / 2;
                this.ctx.beginPath();
                this.ctx.moveTo(fromX, fromY);
                this.ctx.bezierCurveTo(midX, fromY, midX, toY, toX, toY);
                this.ctx.stroke();
                
                // Draw arrow
                const arrowSize = 12 / this.camera.scale;
                const angle = Math.atan2(toY - fromY, toX - fromX);
                this.ctx.fillStyle = '#64748b';
                this.ctx.beginPath();
                this.ctx.moveTo(toX, toY);
                this.ctx.lineTo(toX - arrowSize * Math.cos(angle - Math.PI / 6), toY - arrowSize * Math.sin(angle - Math.PI / 6));
                this.ctx.lineTo(toX - arrowSize * Math.cos(angle + Math.PI / 6), toY - arrowSize * Math.sin(angle + Math.PI / 6));
                this.ctx.closePath();
                this.ctx.fill();
                
                // Draw label if exists
                if (label) {
                    const midX = (fromX + toX) / 2;
                    const midY = (fromY + toY) / 2;
                    
                    this.ctx.fillStyle = '#cbd5e1';
                    this.ctx.font = '11px sans-serif';
                    this.ctx.textAlign = 'center';
                    this.ctx.textBaseline = 'middle';
                    
                    this.ctx.fillRect(midX - 30, midY - 12, 60, 20);
                    this.ctx.fillStyle = '#0f172a';
                    this.ctx.fillText(label, midX, midY);
                }
            }

            saveState() {
                const state = {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON())
                };
                
                this.undoStack.push(state);
                if (this.undoStack.length > this.maxUndoSteps) {
                    this.undoStack.shift();
                }
                this.redoStack = [];
            }

            undo() {
                if (this.undoStack.length === 0) return;
                
                const currentState = {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON())
                };
                this.redoStack.push(currentState);
                
                const previousState = this.undoStack.pop();
                this.nodes = previousState.nodes.map(n => Node.fromJSON(n));
                this.connections = previousState.connections.map(c => Connection.fromJSON(c));
                
                this.save();
                this.render();
                this.updateUI();
            }

            redo() {
                if (this.redoStack.length === 0) return;
                
                const currentState = {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON())
                };
                this.undoStack.push(currentState);
                
                const nextState = this.redoStack.pop();
                this.nodes = nextState.nodes.map(n => Node.fromJSON(n));
                this.connections = nextState.connections.map(c => Connection.fromJSON(c));
                
                this.save();
                this.render();
                this.updateUI();
            }

            save() {
                const data = {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON())
                };
                localStorage.setItem('nexusboard_data', JSON.stringify(data));
            }

            load() {
                try {
                    const params = new URLSearchParams(window.location.search);
                    if (params.has('board')) {
                        try {
                            const state = this.decodeState(params.get('board'));
                            this.nodes = (state.nodes || []).map(n => Node.fromJSON(n));
                            this.connections = (state.connections || []).map(c => Connection.fromJSON(c));
                            this.updateUI();
                            this.saveState();
                            this.resetView();
                            return;
                        } catch (err) {
                            console.error('Invalid shared board state:', err);
                        }
                    }

                    const data = JSON.parse(localStorage.getItem('nexusboard_data') || '{}');
                    
                    if (data.nodes) {
                        this.nodes = data.nodes.map(n => Node.fromJSON(n));
                    }
                    
                    if (data.connections) {
                        this.connections = data.connections.map(c => Connection.fromJSON(c));
                    }
                    
                    this.updateUI();
                    this.saveState();
                    this.resetView();
                } catch (e) {
                    console.error('Failed to load data:', e);
                }
            }
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        const nexusApp = new NexusBoardApp();
    </script>
</body>
