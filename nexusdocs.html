<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusDocs - Markdown Node Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        .canvas-container {
            flex: 1;
            position: relative;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
            background: inherit;
        }

        .editor-panel {
            width: 400px;
            background: #0f172a;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            position: relative;
        }

        .editor-panel.open {
            transform: translateX(0);
        }

        .editor-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-title {
            font-size: 18px;
            font-weight: 600;
        }

        .back-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: #60a5fa;
            background: #0f172a;
        }

        .editor-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-textarea {
            flex: 1;
            background: #1e293b;
            border: none;
            border-bottom: 1px solid #334155;
            padding: 20px;
            color: #e2e8f0;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        .preview-panel {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #0f172a;
        }

        .preview-content {
            color: #e2e8f0;
            line-height: 1.6;
        }

        .preview-content h1 {
            font-size: 24px;
            margin-bottom: 16px;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        .preview-content h2 {
            font-size: 20px;
            margin-bottom: 12px;
            margin-top: 24px;
        }

        .preview-content h3 {
            font-size: 18px;
            margin-bottom: 10px;
            margin-top: 20px;
        }

        .preview-content p {
            margin-bottom: 12px;
        }

        .preview-content ul, .preview-content ol {
            margin-bottom: 12px;
            margin-left: 20px;
        }

        .preview-content li {
            margin-bottom: 4px;
        }

        .preview-content code {
            background: #1e293b;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
        }

        .preview-content pre {
            background: #1e293b;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin-bottom: 12px;
        }

        .preview-content pre code {
            background: none;
            padding: 0;
        }

        .preview-content blockquote {
            border-left: 4px solid #60a5fa;
            padding-left: 16px;
            margin-bottom: 12px;
            color: #94a3b8;
        }

        .preview-content a {
            color: #60a5fa;
            text-decoration: none;
        }

        .preview-content a:hover {
            text-decoration: underline;
        }

        .node {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: 2px solid #60a5fa;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            color: white;
            z-index: 10;
        }

        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .node.selected {
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.3);
        }

        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: #94a3b8;
            backdrop-filter: blur(10px);
        }

        .create-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.3);
        }

        .search-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 300px;
        }

        .search-bar {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e2e8f0;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.2);
        }

        .search-input::placeholder {
            color: #64748b;
        }

        .search-clear-btn {
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-radius: 6px;
            color: #64748b;
            cursor: pointer;
            padding: 10px 12px;
            font-size: 14px;
            transition: all 0.2s;
            display: none;
        }

        .search-clear-btn.visible {
            display: block;
        }

        .search-clear-btn:hover {
            color: #e2e8f0;
            border-color: #60a5fa;
        }

        .search-results {
            position: absolute;
            top: 100%;
            right: 0;
            width: 300px;
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            border-radius: 6px;
            margin-top: 8px;
            max-height: 400px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .search-results.visible {
            display: block;
        }

        .search-result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover {
            background: #1e293b;
            border-left-color: #60a5fa;
        }

        .search-result-label {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .search-result-snippet {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.4;
            max-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .search-result-snippet .highlight {
            background: #fbbf24;
            color: #000;
            padding: 0 2px;
            border-radius: 2px;
            font-weight: 600;
        }

        .search-no-results {
            padding: 16px;
            text-align: center;
            color: #64748b;
            font-size: 13px;
        }

        .node.search-highlight {
            animation: search-glow 0.6s ease-in-out infinite;
        }

        @keyframes search-glow {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(251, 191, 36, 0.2);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div id="nodesContainer"></div>
            <button class="create-btn" onclick="nexusDocs.createNode()">Create Node</button>
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search notes...">
                    <button class="search-clear-btn" id="searchClearBtn" onclick="nexusDocs.clearSearch()">✕</button>
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="info-panel">
                <strong>Nodes:</strong> <span id="nodeCount">0</span> |
                <strong>Hint:</strong> Click nodes to edit notes
            </div>
        </div>
        <div class="editor-panel" id="editorPanel">
            <div class="editor-header">
                <div class="editor-title" id="editorTitle">Node Notes</div>
                <button class="back-btn" onclick="nexusDocs.closeEditor()">Back</button>
            </div>
            <div class="editor-content">
                <textarea class="editor-textarea" id="editorTextarea" placeholder="Write your markdown notes here..."></textarea>
                <div class="preview-panel">
                    <div class="preview-content" id="previewContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class Node {
            constructor(x, y, label = 'New Node') {
                this.id = 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                this.label = label;
                this.x = x;
                this.y = y;
                this.element = null;
            }

            createElement() {
                const div = document.createElement('div');
                div.className = 'node';
                div.textContent = this.label;
                div.style.left = this.x - 40 + 'px';
                div.style.top = this.y - 40 + 'px';
                div.addEventListener('click', () => nexusDocs.openEditor(this));
                this.element = div;
                return div;
            }

            updatePosition() {
                if (this.element) {
                    this.element.style.left = this.x - 40 + 'px';
                    this.element.style.top = this.y - 40 + 'px';
                }
            }
        }

        class NexusDocs {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.nodesContainer = document.getElementById('nodesContainer');
                this.editorPanel = document.getElementById('editorPanel');
                this.editorTextarea = document.getElementById('editorTextarea');
                this.previewContent = document.getElementById('previewContent');
                this.editorTitle = document.getElementById('editorTitle');
                this.nodeCount = document.getElementById('nodeCount');
                this.searchInput = document.getElementById('searchInput');
                this.searchResults = document.getElementById('searchResults');
                this.searchClearBtn = document.getElementById('searchClearBtn');

                this.nodes = [];
                this.currentNode = null;
                this.draggedNode = null;
                this.dragOffset = { x: 0, y: 0 };
                this.searchQuery = '';

                this.setupCanvas();
                this.setupEventListeners();
                this.loadNodes();
                this.updateUI();
            }

            setupCanvas() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = this.canvas.offsetWidth;
                this.canvas.height = this.canvas.offsetHeight;
                this.render();
            }

            setupEventListeners() {
                this.canvas.addEventListener('click', (e) => this.handleCanvasClick(e));
                this.editorTextarea.addEventListener('input', () => this.updatePreview());
                document.addEventListener('mousedown', (e) => this.handleMouseDown(e));
                document.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                document.addEventListener('mouseup', () => this.handleMouseUp());
                this.searchInput.addEventListener('input', (e) => this.handleSearch(e));
                this.searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') {
                        this.clearSearch();
                    }
                });
            }

            handleSearch(e) {
                this.searchQuery = e.target.value.toLowerCase().trim();
                
                if (this.searchQuery.length === 0) {
                    this.clearHighlights();
                    this.searchResults.classList.remove('visible');
                    this.searchClearBtn.classList.remove('visible');
                } else {
                    this.searchClearBtn.classList.add('visible');
                    this.performSearch();
                }
            }

            performSearch() {
                const results = [];

                this.nodes.forEach(node => {
                    const notes = this.getNodeNotes(node.id);
                    if (notes.toLowerCase().includes(this.searchQuery)) {
                        const snippet = this.extractSnippet(notes, this.searchQuery);
                        results.push({
                            node: node,
                            snippet: snippet
                        });
                        node.element.classList.add('search-highlight');
                    } else {
                        node.element.classList.remove('search-highlight');
                    }
                });

                this.displaySearchResults(results);
            }

            extractSnippet(text, query) {
                const lowerText = text.toLowerCase();
                const index = lowerText.indexOf(query);
                
                if (index === -1) return text.substring(0, 60) + '...';

                let start = Math.max(0, index - 30);
                let end = Math.min(text.length, index + query.length + 30);
                
                let snippet = text.substring(start, end);
                if (start > 0) snippet = '...' + snippet;
                if (end < text.length) snippet = snippet + '...';

                const highlighted = snippet.replace(
                    new RegExp(`(${query})`, 'gi'),
                    '<span class="highlight">$1</span>'
                );

                return highlighted;
            }

            displaySearchResults(results) {
                if (results.length === 0) {
                    this.searchResults.innerHTML = '<div class="search-no-results">No results found</div>';
                } else {
                    this.searchResults.innerHTML = results.map(result => `
                        <div class="search-result-item" onclick="nexusDocs.openSearchResult('${result.node.id}')">
                            <div class="search-result-label">${this.escapeHtml(result.node.label)}</div>
                            <div class="search-result-snippet">${result.snippet}</div>
                        </div>
                    `).join('');
                }
                this.searchResults.classList.add('visible');
            }

            openSearchResult(nodeId) {
                const node = this.nodes.find(n => n.id === nodeId);
                if (node) {
                    this.openEditor(node);
                    this.clearSearch();
                }
            }

            clearSearch() {
                this.searchInput.value = '';
                this.searchQuery = '';
                this.clearHighlights();
                this.searchResults.classList.remove('visible');
                this.searchClearBtn.classList.remove('visible');
            }

            clearHighlights() {
                this.nodes.forEach(node => {
                    node.element.classList.remove('search-highlight');
                });
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            handleCanvasClick(e) {
                if (e.target === this.canvas) {
                    this.closeEditor();
                }
            }

            handleMouseDown(e) {
                if (e.target.classList.contains('node')) {
                    const nodeId = e.target.dataset.nodeId;
                    const node = this.nodes.find(n => n.id === nodeId);
                    if (node) {
                        this.draggedNode = node;
                        const rect = node.element.getBoundingClientRect();
                        this.dragOffset.x = e.clientX - rect.left - 40;
                        this.dragOffset.y = e.clientY - rect.top - 40;
                        e.preventDefault();
                    }
                }
            }

            handleMouseMove(e) {
                if (this.draggedNode) {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left - this.dragOffset.x;
                    const y = e.clientY - rect.top - this.dragOffset.y;
                    this.draggedNode.x = Math.max(40, Math.min(x + 40, this.canvas.width - 40));
                    this.draggedNode.y = Math.max(40, Math.min(y + 40, this.canvas.height - 40));
                    this.draggedNode.updatePosition();
                    this.saveNodes();
                }
            }

            handleMouseUp() {
                if (this.draggedNode) {
                    this.draggedNode = null;
                }
            }

            createNode() {
                const x = Math.random() * (this.canvas.width - 160) + 80;
                const y = Math.random() * (this.canvas.height - 160) + 80;
                const node = new Node(x, y);
                this.nodes.push(node);
                this.nodesContainer.appendChild(node.createElement());
                node.element.dataset.nodeId = node.id;
                this.saveNodes();
                this.updateUI();
            }

            openEditor(node) {
                this.currentNode = node;
                this.editorTitle.textContent = node.label;
                this.editorTextarea.value = this.getNodeNotes(node.id);
                this.updatePreview();
                this.editorPanel.classList.add('open');
                this.nodes.forEach(n => n.element.classList.remove('selected'));
                node.element.classList.add('selected');
            }

            closeEditor() {
                if (this.currentNode) {
                    this.saveNodeNotes(this.currentNode.id, this.editorTextarea.value);
                }
                this.currentNode = null;
                this.editorPanel.classList.remove('open');
                this.nodes.forEach(n => n.element.classList.remove('selected'));
            }

            getNodeNotes(nodeId) {
                return localStorage.getItem(`nexusdocs_notes_${nodeId}`) || '';
            }

            saveNodeNotes(nodeId, notes) {
                localStorage.setItem(`nexusdocs_notes_${nodeId}`, notes);
            }

            updatePreview() {
                const markdown = this.editorTextarea.value;
                this.previewContent.innerHTML = this.markdownToHtml(markdown);
            }

            markdownToHtml(markdown) {
                let html = markdown
                    // Headers
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                    // Bold
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    // Italic
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    // Links
                    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
                    // Code blocks
                    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                    // Inline code
                    .replace(/`([^`]+)`/g, '<code>$1</code>')
                    // Lists
                    .replace(/^\- (.*$)/gim, '<li>$1</li>')
                    .replace(/^\d+\. (.*$)/gim, '<li>$1</li>')
                    // Blockquotes
                    .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                    // Paragraphs
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');

                // Wrap in paragraphs
                if (!html.startsWith('<')) {
                    html = '<p>' + html + '</p>';
                }
                html = html.replace(/<p><\/p>/g, '');

                return html;
            }

            loadNodes() {
                const saved = localStorage.getItem('nexusdocs_nodes');
                if (saved) {
                    const nodeData = JSON.parse(saved);
                    this.nodes = nodeData.map(data => {
                        const node = new Node(data.x, data.y, data.label);
                        node.id = data.id;
                        return node;
                    });
                    this.nodes.forEach(node => {
                        this.nodesContainer.appendChild(node.createElement());
                        node.element.dataset.nodeId = node.id;
                    });
                }
            }

            saveNodes() {
                const nodeData = this.nodes.map(node => ({
                    id: node.id,
                    label: node.label,
                    x: node.x,
                    y: node.y
                }));
                localStorage.setItem('nexusdocs_nodes', JSON.stringify(nodeData));
            }

            updateUI() {
                this.nodeCount.textContent = this.nodes.length;
            }

            render() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                // Background pattern
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
                for (let x = 0; x < this.canvas.width; x += 40) {
                    for (let y = 0; y < this.canvas.height; y += 40) {
                        if ((x + y) % 80 === 0) {
                            this.ctx.fillRect(x, y, 40, 40);
                        }
                    }
                }
            }
        }

        const nexusDocs = new NexusDocs();
    </script>
</body>
</html>
